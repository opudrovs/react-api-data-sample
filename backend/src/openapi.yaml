openapi: 3.1.0
info:
  title: Task API with Supabase Auth
  version: 1.0.0

servers:
  - url: http://localhost:4000
    description: Local development server

paths:
  /api/auth/login:
    post:
      summary: Log in a user and return an auth cookie
      operationId: logInUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        200:
          description: Successful login, sets the auth cookie
        400:
          description: Bad Request - Email and password are required
        401:
          description: Unauthorized - Invalid credentials
        500:
          description: Internal Server Error

  /api/auth/logout:
    post:
      summary: Log out a user by clearing the authentication cookie
      operationId: logoutUser
      security: []
      responses:
        200:
          description: Successfully logged out, cookie cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Logged out successfully'
        500:
          description: Internal Server Error - Failed to clear auth cookie

  /api/tasks:
    get:
      summary: Get all tasks
      operationId: getAllTasks
      security:
        - CookieAuth: []
      responses:
        200:
          description: OK - A list of active tasks (soft deleted tasks are excluded)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        401:
          description: Unauthorized - Auth cookie missing or invalid
        500:
          description: Internal Server Error - Failed to retrieve tasks
    post:
      summary: Create a new task
      operationId: createTask
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewTask'
      responses:
        201:
          description: Created - Task created
        401:
          description: Unauthorized - Auth cookie missing or invalid
        500:
          description: Internal Server Error - Failed to create task

  /api/tasks/{id}:
    get:
      summary: Get a specific task
      operationId: getTaskById
      security:
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: OK - Task retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        401:
          description: Unauthorized - Auth cookie missing or invalid
        404:
          description: Not Found - Task not found
        500:
          description: Internal Server Error - Failed to retrieve task
    put:
      summary: Update a task
      operationId: updateTaskById
      security:
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTask'
      responses:
        200:
          description: OK - Task updated
        401:
          description: Unauthorized - Auth cookie missing or invalid
        403:
          description: Forbidden - Task is read-only and cannot be updated
        404:
          description: Not Found - Task not found
        500:
          description: Internal Server Error - Failed to update task
    delete:
      summary: Soft-delete a task
      operationId: softDeleteTaskById
      security:
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        204:
          description: No Content - Task soft-deleted
        401:
          description: Unauthorized - Auth cookie missing or invalid
        403:
          description: Forbidden - Task is read-only and cannot be deleted
        404:
          description: Not Found - Task not found or already deleted
        500:
          description: Internal Server Error - Failed to delete task

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: authToken

  schemas:
    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string

    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
        dueDate:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true
        readOnly:
          type: boolean
          default: false
    NewTask:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
        dueDate:
          type: string
          format: date-time
        readOnly:
          type: boolean
          default: false
    UpdateTask:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
        dueDate:
          type: string
          format: date-time
        readOnly:
          type: boolean
          default: false
